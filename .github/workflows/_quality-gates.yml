name: Quality Gates

# Reusable workflow: the actual quality gates every change goes through.
# Called by ci.yml (feature/fix branches, PRs) and release.yml (main/development pushes).
on:
  workflow_call:

jobs:
  casing-guard:
    name: casing-guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Guard mis-cased import paths
        run: |
          set -e
          bad=0
          # Folder casing
          if grep -RInE "@/components/Payment/|\.\./Payment/" --include=\*.{ts,tsx,js,jsx} app components; then
            echo "Found '/components/Payment/'. Use '/components/payment/'."
            bad=1
          fi
          # Component casing (imports vs file)
          if grep -RIn "PayPalComponent" --include=\*.{ts,tsx,js,jsx} app components; then
            echo "Found 'PayPalComponent' in imports. Standardize on 'PaypalComponent' OR provide shim."
          fi
          # Ensure required file exists with correct casing
          if [ ! -f components/payment/PaypalComponent.tsx ]; then
            echo "Missing components/payment/PaypalComponent.tsx (check case)."
            bad=1
          fi
          exit $bad

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      # Non-blocking for now: running this for real (previously never run in CI)
      # surfaced ~37 pre-existing type errors already on development, unrelated
      # to any single PR. See docs/known-issues.md. Flip to blocking once clean.
      - name: Type check (non-blocking, see docs/known-issues.md)
        continue-on-error: true
        run: npx tsc --noEmit

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      # Non-blocking: typescript@7.0.2 is incompatible with eslint-config-next's
      # bundled typescript-eslint (upstream blocker, see CLAUDE.md and
      # docs/decisions/0003-lint-non-blocking-pending-ts7-support.md).
      - name: Lint (non-blocking, see docs/known-issues.md)
        continue-on-error: true
        run: npx eslint .

  unit-test:
    name: unit-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  # There is deliberately no standalone `build` job (`npm run build` on the
  # bare runner or in a plain container). It was found to crash silently and
  # deterministically — Next.js prints "Skipping validation of types" then
  # the process dies with no error output — specifically on GitHub Actions'
  # own infrastructure. Root cause not isolated despite extensive attempts
  # (ruled out: this repo's own code, a poisoned npm cache, running inside
  # the exact node:20-alpine image `docker-smoke` uses, a fresh git-clone-
  # inside-container with zero macOS-originated files); it never reproduced
  # in any local Docker build, only in GitHub's actual runner/container
  # execution. `docker-smoke` below already fully exercises the same `next
  # build` via the real Dockerfile (a proven-reliable path — this job has
  # never failed) and is arguably the more representative check anyway,
  # since it builds the exact artifact that gets deployed. See
  # docs/known-issues.md.
  docker-smoke:
    name: docker-smoke
    needs: casing-guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set Org Lowercase
        uses: ./.github/actions/set-org-lowercase

      - name: Generate .env file
        uses: ./.github/actions/generate-env
        with:
          paypal_client_id: ${{ secrets.NEXT_PUBLIC_PAYPAL_CLIENT_ID }}
          stripe_publishable_keys: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEYS }}
          stripe_webhook_url: ${{ secrets.NEXT_PUBLIC_STRIPE_WEBHOOK_URL }}
          newwave_api_url: ${{ secrets.NEXT_PUBLIC_NEWWAVE_API_URL }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker build for testing
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ghcr.io/${{ env.ORG }}/newwave4-frontend:${{ github.sha }}

      - name: Docker image smoke test
        run: |
          docker run --name newwave4-frontend-app -d -p 3000:3000 ghcr.io/${{ env.ORG }}/newwave4-frontend:${{ github.sha }}
          echo Testing Image URL using wget
          # Checks for a valid HTML response rather than specific brand text, since the
          # homepage's default locale (UA) legitimately renders its title/branding in
          # Ukrainian, not the English "New Wave" string.
          wget -q -O - 127.0.0.1:3000 | grep -qi "<!DOCTYPE html"
