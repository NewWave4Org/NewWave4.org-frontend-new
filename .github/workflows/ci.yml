name: CI

# Feature/fix branch pushes and PRs. Pushes to main/development are owned by
# release.yml instead — this workflow never pushes a real semver image tag.
on:
  pull_request:
    branches:
      - development
      - main
      - 'feature-*'
      - 'feature/*'
      - 'fix-*'
  push:
    branches:
      - 'feature-*'
      - 'feature/*'
      - 'fix-*'
  workflow_dispatch:

jobs:
  quality-gates:
    uses: ./.github/workflows/_quality-gates.yml
    secrets: inherit

  # Ephemeral, traceable image for manual reviewer pulls on PRs into development.
  # Never a real semver, never auto-deployed anywhere.
  docker-pr-publish:
    name: docker-pr-publish
    needs: quality-gates
    if: github.event_name == 'pull_request' && github.base_ref == 'development'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Org Lowercase
        uses: ./.github/actions/set-org-lowercase

      - name: Generate .env file
        uses: ./.github/actions/generate-env
        with:
          paypal_client_id: ${{ secrets.NEXT_PUBLIC_PAYPAL_CLIENT_ID }}
          stripe_publishable_keys: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEYS }}
          stripe_webhook_url: ${{ secrets.NEXT_PUBLIC_STRIPE_WEBHOOK_URL }}
          newwave_api_url: ${{ secrets.NEXT_PUBLIC_NEWWAVE_API_URL }}

      - name: GHCR Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build and push (PR tag only)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ghcr.io/${{ env.ORG }}/newwave4-frontend:pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
