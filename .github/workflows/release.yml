name: Release

# Push-based (not PR-based) release automation: semantic-release runs directly
# on push to main/development, so it needs no release PR of its own — which
# matters because restrict-main-merges.yml only accepts PRs into main from a
# branch literally named `development`. See
# docs/decisions/0002-semantic-release-over-release-please.md.
on:
  push:
    branches: [main, development]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality-gates:
    uses: ./.github/workflows/_quality-gates.yml
    secrets: inherit

  release:
    name: release
    needs: quality-gates
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Branch protection on main/development requires 1 PR approval and
          # blocks direct pushes from non-admin identities — the default
          # GITHUB_TOKEN cannot push the release commit/tag. RELEASE_ADMIN_TOKEN
          # must be a fine-grained PAT from a repo admin account. See
          # docs/decisions/0002-semantic-release-over-release-please.md.
          token: ${{ secrets.RELEASE_ADMIN_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Run semantic-release
        id: semantic
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_ADMIN_TOKEN }}

  docker-publish:
    name: docker-publish
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set Org Lowercase
        run: echo "ORG=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Generate .env file
        run: |
          echo "NEXT_PUBLIC_BASE_PATH=" > .env
          echo "NEXT_PUBLIC_PAYPAL_CLIENT_ID=${{ secrets.NEXT_PUBLIC_PAYPAL_CLIENT_ID }}" >> .env
          echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEYS=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEYS }}" >> .env
          echo "NEXT_PUBLIC_STRIPE_WEBHOOK_URL=${{ secrets.NEXT_PUBLIC_STRIPE_WEBHOOK_URL }}" >> .env
          echo "NEXT_PUBLIC_NEWWAVE_API_URL=${{ secrets.NEXT_PUBLIC_NEWWAVE_API_URL }}" >> .env

      - name: GHCR Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push versioned image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ghcr.io/${{ env.ORG }}/newwave4-frontend:${{ needs.release.outputs.new_release_version }}

      - name: Alias :latest to this release (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ env.ORG }}/newwave4-frontend:latest \
            ghcr.io/${{ env.ORG }}/newwave4-frontend:${{ needs.release.outputs.new_release_version }}

  helm-publish:
    name: helm-publish
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout (branch HEAD, includes the semantic-release version-bump commit)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set Org Lowercase
        run: echo "ORG=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.4'

      - name: Login to GHCR for Helm (OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" --password-stdin

      - name: Package Helm chart
        id: pkg
        run: |
          set -euo pipefail
          PKG_FILE=$(helm package helm/frontend-chart | awk '{print $NF}')
          echo "pkg=${PKG_FILE}" >> "$GITHUB_OUTPUT"

      - name: Push Helm chart to GHCR
        run: |
          set -euo pipefail
          helm push "${{ steps.pkg.outputs.pkg }}" oci://ghcr.io/${{ env.ORG }}/charts

  deploy-staging:
    name: deploy-staging
    needs: [release, docker-publish, helm-publish]
    if: needs.release.outputs.new_release_published == 'true' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/deploy-to-kubernetes.yml
    with:
      namespace: staging
      chart_version: ${{ needs.release.outputs.new_release_version }}
      image_tag: ${{ needs.release.outputs.new_release_version }}
    secrets: inherit
