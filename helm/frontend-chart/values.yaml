# Default, non-secret values for the newwave4-frontend-chart.
#
# Historically this entire file lived only inside the `VALUES_YAML` GitHub
# secret (see .github/workflows/deploy-to-kubernetes.yml), making infra
# config undiffable and unreviewable in PRs. This file now provides
# committed defaults; deploy-to-kubernetes.yml applies it first
# (`-f helm/frontend-chart/values.yaml`) and then layers the secret file on
# top (`-f ./values.yaml`), so any key still set in the secret continues to
# win. Only the three still-secret `NEXT_PUBLIC_*` values below are expected
# to keep coming from the secret overlay — everything else should move here
# over time as it's confirmed safe to commit.
#
# See docs/known-issues.md: these NEXT_PUBLIC_* values are already inlined
# into the client bundle at Docker build time, making this Secret injection
# redundant for the browser bundle (it only affects server-side reads).

replicaCount: 2

image:
  # Also always overridden at deploy time via --set image.repository=... ,
  # computed dynamically from the lowercased repo owner (see
  # .github/actions/set-org-lowercase and deploy-to-kubernetes.yml) — this
  # static default only matters for `helm template`/`helm lint` run locally
  # against this file alone, and will silently disagree with a real deploy
  # if the repo is ever forked/renamed to a different GitHub org.
  repository: ghcr.io/newwave4org/newwave4-frontend
  pullPolicy: IfNotPresent
  # Overridden at deploy time via --set image.tag=<version> (see
  # deploy-to-kubernetes.yml / release.yml) — never rely on this default.
  tag: ''

# Also always overridden at deploy time via --set imagePullSecrets[0].name=...
# (see deploy-to-kubernetes.yml) — kept here only so `helm template` succeeds
# against this file alone; the --set flag is the actual source of truth.
imagePullSecrets:
  - name: ghcr-regcred

nameOverride: ''
fullnameOverride: ''
namespaceOverride: ''

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ''

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
  hosts:
    - host: staging.newwave4.org
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: newwave4-frontend-tls
      hosts:
        - staging.newwave4.org

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# /robots.txt is used instead of / deliberately: / hits next-intl middleware,
# which 307-redirects to /ua and then server-renders the full dynamic
# homepage — kubelet's httpGet probes follow that redirect, so a probe
# against / pays for a full SSR render (plus whatever backend calls that
# page makes) on every single check. /robots.txt is a statically prerendered
# route (confirmed in the `next build` output as "○ Static") outside
# middleware.ts's matcher entirely (its dot-extension excludes it), so it's
# a cheap, backend-independent "is this process alive" check — the correct
# scope for a liveness/readiness probe. Caused a real crash-loop incident in
# staging on 2026-07-19 (timeoutSeconds defaulted to Kubernetes' implicit 1s,
# nowhere near enough for the / redirect+render chain under real cluster
# resource limits) — see docs/known-issues.md.
livenessProbe:
  httpGet:
    path: /robots.txt
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /robots.txt
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

volumes: []
volumeMounts: []

# Still secret-delivered via the VALUES_YAML GitHub secret overlay — kept
# here only as empty placeholders so `helm lint`/`helm template` succeed
# against this file alone.
secret:
  NEXT_PUBLIC_PAYPAL_CLIENT_ID: ''
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEYS: ''
  NEXT_PUBLIC_NEWWAVE_API_URL: ''
